name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install ".[dev]"
          python -c "from sentinella.nlp.classifier import get_classifier; get_classifier()._download_model()"

      - name: Lint
        run: python -m ruff check sentinella/

      - name: Test
        run: python -m pytest tests/ -v --tb=short --cov=sentinella --cov-report=term-missing

      - name: Security check
        run: pip install safety && safety check --short-output 2>/dev/null || true

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          MAIN_JS=$(ls -la dist/assets/index-*.js | awk '{print $5}')
          echo "Main JS bundle: $MAIN_JS bytes"
          if [ "$MAIN_JS" -gt 2000000 ]; then
            echo "WARNING: Bundle exceeds 2MB"
          fi

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t vigilus-backend ./backend

      - name: Build frontend image
        run: docker build -t vigilus-frontend ./frontend

      - name: Test backend image health
        run: |
          docker run -d --name test-backend -p 8000:8000 vigilus-backend
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-backend
