<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="eye" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Shield -->
  <path d="M256 32 L448 112 L448 240 C448 368 352 448 256 480 C160 448 64 368 64 240 L64 112 Z" 
        fill="url(#shield)" opacity="0.15" stroke="url(#shield)" stroke-width="3"/>
  <path d="M256 56 L424 128 L424 240 C424 352 340 424 256 456 C172 424 88 352 88 240 L88 128 Z" 
        fill="none" stroke="url(#shield)" stroke-width="1.5" opacity="0.4"/>
  <!-- Eye of vigilance -->
  <ellipse cx="256" cy="232" rx="96" ry="56" fill="none" stroke="url(#eye)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="256" cy="232" r="24" fill="url(#eye)" filter="url(#glow)"/>
  <circle cx="256" cy="232" r="8" fill="#05070f"/>
  <!-- Scan lines radiating -->
  <line x1="256" y1="160" x2="256" y2="100" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <line x1="192" y1="184" x2="148" y2="140" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <line x1="320" y1="184" x2="364" y2="140" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <!-- Italy silhouette hint (boot) -->
  <path d="M240 300 L248 340 L260 360 L270 356 L264 340 L272 300" 
        fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  <!-- Text -->
  <text x="256" y="420" text-anchor="middle" font-family="monospace" font-weight="700" font-size="48" fill="#e5e7eb" letter-spacing="12">VIGILUS</text>
</svg>
